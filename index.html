<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <div class="glass-card animate-fade-up">
            <h1 class="name-shimmer animate-fade-up stagger-1">Alex Carter</h1>
            <p class="role animate-fade-up stagger-2">Software Engineer & Designer</p>
            
            <div class="time-widget animate-fade-up stagger-3">
                <div id="clock" class="clock">12:00:00</div>
                <div id="date" class="date">Monday, January 1, 2026</div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
